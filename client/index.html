<!DOCTYPE html>
<html>
<head>
  <title>Matrices</title>
</head>
<body>

<h2>Matrices</h2>

<!-- inputs para definir tamaño -->
<label>Filas:</label>
<input type="number" id="filas">

<label>Columnas:</label>
<input type="number" id="columnas">

<!-- botón que genera los inputs dinámicamente -->
<button onclick="crearMatrices()">Crear matrices</button>

<!-- acá se van a dibujar las matrices -->
<div id="matrices"></div>

<!-- botones para operaciones -->
<button onclick="sumar()">Sumar (local)</button>
<button onclick="multiplicar()">Multiplicar (local)</button>

<h3>Resultado:</h3>
<div id="resultado"></div>

<script src="script.js"></script>
</body>
</html>
